<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0b;color:#efefef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:100px;padding-top:env(safe-area-inset-top,20px)}
button,select{font-family:inherit;cursor:pointer}
select{-webkit-appearance:none;appearance:none}
.hdr{background:linear-gradient(160deg,#131315,#1a0e0a);border-bottom:1px solid #1e1e22;padding:28px 16px 16px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ttl{font-family:Impact,sans-serif;font-size:clamp(2rem,8vw,3.2rem);letter-spacing:2px;line-height:.95}
.ttl span{color:#ff4d1c}
.wbadge{text-align:center;border-radius:12px;padding:8px 12px;min-width:72px}
.wl{font-size:9px;color:#6b6b78;font-weight:700;letter-spacing:1px}
.wv{font-family:Impact,sans-serif;font-size:2rem;line-height:1}
.wr{font-size:10px;font-weight:700}
.dlbar{margin-top:12px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:10px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between}
.dll{font-size:10px;color:#6b6b78;font-weight:700;letter-spacing:1px}
.dld{font-size:13px;color:#f5a623;font-weight:700;margin-top:2px}
.dlc{font-family:Impact,sans-serif;font-size:1.6rem;line-height:1}
.dls{font-size:9px;color:#6b6b78}
.mtog{display:flex;gap:8px;padding:14px 14px 6px}
.mbtn{flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid #252528;background:#161618;color:#888;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
.days{display:flex;flex-direction:column;gap:10px;padding:4px 14px 20px}
.dc{background:#1a1a1d;border-radius:14px;overflow:hidden;border:1px solid #252528}
.dh{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.dbox{width:46px;height:46px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.dlbl{font-family:Impact,sans-serif;font-size:.8rem;letter-spacing:1px;line-height:1.1;text-align:center}
.tdot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;border:2px solid #1a1a1d}
.di{flex:1}
.dn{font-family:Impact,sans-serif;font-size:1.1rem;letter-spacing:1.5px;line-height:1}
.ds{font-size:11px;color:#6b6b78;margin-top:3px}
.dpb{margin-top:6px;height:3px;background:#252528;border-radius:2px;overflow:hidden}
.dpf{height:100%;border-radius:2px}
.dchev{font-size:18px;color:#6b6b78;transition:transform .2s;flex-shrink:0}
.dcnt{font-size:10px;font-weight:600}
.dbody{border-top:1px solid #252528}
.abanner{padding:9px 12px;display:flex;align-items:center;gap:8px;background:rgba(168,85,247,.1);border-bottom:1px solid rgba(168,85,247,.2)}
.abtxt{font-size:12px;color:#c084fc;font-weight:600}
.ssblk{border-radius:12px;overflow:hidden;margin:8px 0}
.sshdr{padding:8px 12px;display:flex;align-items:center}
.sslbl{font-size:11px;font-weight:800;letter-spacing:1px}
.ssbetween{padding:2px 12px 2px 80px;display:flex;align-items:center}
.ssarr{font-size:9.5px;font-weight:700}
.ssftr{padding:6px 12px 9px 28px}
.ssftr span{font-size:10.5px;font-weight:700}
.sswrap{position:relative;padding-left:10px}
.ssnum{position:absolute;left:2px;top:16px;width:16px;height:16px;border-radius:50%;color:#000;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;z-index:2}
.exrow{border-bottom:1px solid #1e1e22}
.extap{display:flex;align-items:flex-start;gap:10px;padding:11px 12px 8px;cursor:pointer;user-select:none;-webkit-user-select:none}
.exicon{width:64px;height:64px;flex-shrink:0;border-radius:12px;border:1px solid #252528;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#111113}
.excnt{flex:1;min-width:0}
.exnm{font-size:13.5px;font-weight:600;color:#efefef;line-height:1.2}
.exst{font-size:12px;color:#6b6b78;margin-top:3px}
.exst strong{color:#c0c0c0}
.extip{font-size:11px;color:#555;margin-top:3px;line-height:1.4}
.exbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.bdg{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:12px;border:1px solid}
.ba{color:#3d8bff;border-color:rgba(61,139,255,.4);background:rgba(61,139,255,.12)}
.bs{color:#f5a623;border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.12)}
.bf{color:#ff6b35;border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.12)}

    {id:'chestpress_sam_b',name:'Machine Chest Press',icon:'chestPress',cat:'assist',tip:'Machine guid\u00e9e \u00b7 Pecs central'},
    {id:'seatedrow_sam_b',name:'Seated Cable Row',icon:'seatedRow',cat:'assist',tip:'Dos \u00e9paisseur \u00b7 Tire vers le ventre'},
    {id:'legpress_sam_b',name:'Leg Press 45\u00b0',icon:'legPress',cat:'assist',tip:'Cuisses \u00b7 Pieds largeur \u00e9paules'},
    {id:'cablepull_sam',isVariant:true,name:'Cable Pull-Through',icon:'pullThrough',cat:'assist',tip:'C\u00e2ble entre les jambes \u00b7 Pousse les hanches en avant \u00b7 Fessiers \u00b7 Variation semaine B'},
    {id:'calf_sam_b',name:'Standing Calf Raise',icon:'calf',cat:'assist',tip:'Mollets \u00b7 Monte sur la pointe des pieds'},
  ]},
  {id:'dim',label:'DIM',name:'R\u00e9cup\u00e9ration Active',sub:'Prise neutre + Adduction',color:'#6b6b78',exercises:[
    {id:'ab_dim_b',name:'Ab Machine (light)',icon:'abMachine',cat:'assist',isAbdo:true,tip:'L\u00e9ger \u00b7 Gainage doux'},
    {id:'walk_dim_b',name:'Incline Treadmill Walk',icon:'inclineTreadmill',cat:'cardio',tip:'35-50 min \u00b7 Cardio doux \u00b7 R\u00e9cup\u00e9ration active'},
    {id:'neutrallat',isVariant:true,name:'Neutral Grip Lat Pulldown',icon:'latPull',cat:'assist',tip:'Prise neutre \u00b7 M\u00eame machine \u00b7 Milieu du dos \u00b7 Variation semaine B'},
    {id:'hipadduct_dim',isVariant:true,name:'Hip Adduction Machine',icon:'hipAbduct',cat:'assist',tip:'Int\u00e9rieur cuisse \u00b7 L\u00e9ger \u00b7 Variation semaine B'},
    {id:'seatedcalf_b',name:'Seated Calf Raise Machine',icon:'calf',cat:'assist',tip:'Mollets assis \u00b7 Poids sur les genoux \u00b7 Variation semaine B'},
  ]},
];

// ── HELPERS ────────────────────────────────────────────────────────────────
function getISO(){var d=new Date(),f=new Date(d.getFullYear(),0,1),x=Math.floor((d-f)/86400000);return Math.ceil((x+f.getDay()+1)/7);}
function getWK(){var d=new Date();return d.getFullYear()+'-W'+getISO();}
function getTI(){var d=new Date().getDay();return d===0?6:d-1;}
function getReps(ex,wt){
  if(ex.isAbdo)return'4 \u00d7 15 reps';
  if(ex.id==='pullov')return'3 \u00d7 12\u201315 reps';
  if(ex.cat==='cardio'){var m={cardio_jeu:'20\u201325 min',walk_dim:'35\u201350 min'};return m[ex.id]||'\u2014';}
  if(ex.isIso)return wt==='A'?'3 \u00d7 12\u201315 reps':'3 \u00d7 15\u201320 reps';
  return wt==='A'?'4 \u00d7 8\u201310 reps':'4 \u00d7 12\u201315 reps';
}
function buildBlocks(exs){
  var blocks=[],cur=null;
  for(var i=0;i<exs.length;i++){
    var ex=exs[i];
    if(ex.isAbdo||ex.cat==='cardio'||ex.isIso||!ex.pair){
      if(cur){blocks.push(cur);cur=null;}
      blocks.push({type:'solo',exercises:[ex]});
      continue;
    }
    if(cur&&cur.pair===ex.pair&&cur.exercises.length<2){cur.exercises.push(ex);}
    else{if(cur)blocks.push(cur);cur={type:'group',cat:ex.cat,pair:ex.pair,exercises:[ex]};}
  }
  if(cur)blocks.push(cur);
  return blocks.map(function(b){return b.exercises.length===1?{type:'solo',cat:b.cat,exercises:b.exercises}:b;});
}
function exCol(ex,dc){
  if(ex.cat==='cardio')return'#2ecc71';
  return dc;
}
function ld(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── STATE ──────────────────────────────────────────────────────────────────
var TI=getTI();
var WT=getISO()%2===1?'A':'B';
var DL=new Date('2026-07-30');
var JLEFT=Math.max(0,Math.floor((DL-new Date()+new Date().getTimezoneOffset()*60000+3600000)/86400000));
var WK=getWK();
var S={
  mode:'today',
  openDays:{},
  weights:ld('mw10',{}),
  hist:ld('mh10',{}),
  done:ld('mk10',null)===WK?ld('md10',{}):{},
  timer:null,
  timerIv:null
};
S.openDays[TI]=true;
if(ld('mk10',null)!==WK){sv('mk10',WK);}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  var el=document.getElementById('app');
  if(!el)return;
  el.innerHTML=buildHTML();
  bindEvents();
}

function bindEvents(){
  // Mode buttons
  var btnToday=document.getElementById('btn-today');
  var btnWeek=document.getElementById('btn-week');
  if(btnToday)btnToday.addEventListener('click',function(){S.mode='today';S.openDays={};S.openDays[TI]=true;render();});
  if(btnWeek)btnWeek.addEventListener('click',function(){S.mode='week';S.openDays={};render();});
  // Day headers
  var dhs=document.querySelectorAll('.dh');
  dhs.forEach(function(dh){
    dh.addEventListener('click',function(){
      var i=parseInt(this.getAttribute('data-i'));
      if(S.openDays[i])delete S.openDays[i];else S.openDays[i]=true;
      render();
    });
  });
  // Exercise taps
  var taps=document.querySelectorAll('.extap');
  taps.forEach(function(tap){
    tap.addEventListener('click',function(){
      var id=this.getAttribute('data-id');
      S.done[id]=!S.done[id];
      sv('md10',S.done);
      render();
    });
  });
  // Weight selects
  var sels=document.querySelectorAll('.wsel');
  sels.forEach(function(sel){
    sel.addEventListener('change',function(e){
      e.stopPropagation();
      var id=this.getAttribute('data-id');
      var val=this.value;
      S.weights[id]=val;
      sv('mw10',S.weights);
      var hist=S.hist[id]||[];
      var last=hist.length>0?hist[hist.length-1]:null;
      if(last&&last.weight===val){hist[hist.length-1].completedCount=(last.completedCount||1)+1;}
      else{hist.push({weight:val,completedCount:1});if(hist.length>20)hist.shift();}
      S.hist[id]=hist;
      sv('mh10',S.hist);
      render();
    });
    sel.addEventListener('click',function(e){e.stopPropagation();});
  });
  // FAB
  var fab=document.getElementById('fab');
  if(fab)fab.addEventListener('click',startTimer);
  // Skip timer
  var skip=document.getElementById('tskip');
  if(skip)skip.addEventListener('click',function(){stopTimer();render();});
}

function buildHTML(){
  var wA=WT==='A';
  var PROG=WT==='B'?PB:P;
  var td=PROG[TI];
  var daysHTML=S.mode==='today'
    ?dayHTML(PROG[TI],TI,true)
    :PROG.map(function(d,i){return dayHTML(d,i,false);}).join('');
  var fabHTML='';
  var timerH='';

  return '<div class="hdr">'
    +'<div class="hdr-top">'
    +'<div class="ttl">ANTHONY <span style="color:#3d8bff">&#9794;</span></div>'
    +'<div class="wbadge" style="background:'+(wA?'rgba(255,77,28,.15)':'rgba(61,139,255,.15)')+';border:1.5px solid '+(wA?'#ff4d1c':'#3d8bff')+'">'
    +'<div class="wl">SEMAINE</div>'
    +'<div class="wv" style="color:'+(wA?'#ff4d1c':'#3d8bff')+'">'+WT+'</div>'
    +'</div></div>'
    +'<div class="dlbar">'
    +'<div><div class="dll">&#128197; R\u00c9VISION DU PROGRAMME</div><div class="dld">30 Juillet 2026</div></div>'
    +'<div style="text-align:right"><div class="dlc" style="color:'+(JLEFT<14?'#ff4d1c':'#f5a623')+'">J\u2013'+JLEFT+'</div><div class="dls">jours restants</div></div>'
    +'</div></div>'
    +'<div class="mtog">'
    +'<button class="mbtn" id="btn-today" style="'+(S.mode==='today'?'background:'+td.color+'18;border-color:'+td.color+';color:'+td.color:'')+'">&#128205; AUJOURD\u2019HUI</button>'
    +'<button class="mbtn" id="btn-week" style="'+(S.mode==='week'?'background:rgba(255,77,28,.15);border-color:#ff4d1c;color:#ff4d1c':'')+'">&#128198; SEMAINE</button>'
    +'</div>'
    +'<div class="days">'+daysHTML+'</div>'
    +fabHTML+timerH;
}

function dayHTML(day,idx,forceOpen){
  var open=forceOpen||!!S.openDays[idx];
  var isToday=idx===TI;
  var dc=0;
  for(var i=0;i<day.exercises.length;i++){
    var ex_i=day.exercises[i];
    if(!ex_i.isAbdo&&S.done[ex_i.id])dc++;
  }
  var tot=day.exercises.filter(function(e){return !e.isAbdo;}).length;
  var pct=Math.round(dc/tot*100);
  var fc=pct===100?'#2ecc71':day.color;
  return '<div class="dc" style="border-color:'+(open?day.color+'50':'#252528')+'">'
    +'<div class="dh" data-i="'+idx+'" style="'+(pct===100?'background:rgba(46,204,113,.08);':'')+'">'
    +'<div class="dbox" style="background:'+day.color+'18">'
    +'<span class="dlbl" style="color:'+day.color+'">'+day.label+'</span>'
    +(isToday?'<span class="tdot" style="background:'+day.color+'"></span>':'')
    +'</div>'
    +'<div class="di">'
    +'<div class="dn" style="color:'+day.color+'">'+day.name+'</div>'
    +'<div class="ds">'+day.sub+'</div>'
    +'<div class="dpb"><div class="dpf" style="width:'+pct+'%;background:'+fc+'"></div></div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
    +(pct===100?'<span style="font-size:18px;color:#2ecc71">&#10003;</span>':'<span class="dchev" style="'+(open?'transform:rotate(90deg)':'')+'">&#8250;</span>')
    +'<span class="dcnt" style="color:'+(pct===100?'#2ecc71':'#6b6b78')+'">'+dc+'/'+tot+'</span>'
    +'</div>'
    +'</div>'
    +(open?'<div class="dbody">'+bodyHTML(day)+'</div>':'')
    +'</div>';
}

function bodyHTML(day){
  return buildBlocks(day.exercises).map(function(b){return blkHTML(b,day);}).join('');
}

function blkHTML(block,day){
  if(block.type==='solo'){
    var ex=block.exercises[0];
    return ex.isAbdo?abdoHTML():exHTML(ex,day);
  }
  var gc='#ffffff';
  return '<div class="ssblk" style="border:1px solid '+gc+'">'
    +'<div class="sshdr" style="background:'+gc+'25"><span class="sslbl" style="color:'+gc+'">\uD83D\uDD17 SUPERSET \u00b7 2 exercices</span></div>'
    +block.exercises.map(function(ex,i){
      var last=i===block.exercises.length-1;
      return '<div class="sswrap"><div class="ssnum" style="background:'+gc+'">'+(i+1)+'</div>'
        +exHTML(ex,day)+'</div>'
        +(!last?'<div class="ssbetween"><span class="ssarr" style="color:'+gc+'">\u2193 SANS REPOS, PASSE AU 2\u00c8ME</span></div>':'');
    }).join('')
    +'<div class="ssftr" style="border-top:1px dashed '+gc+'30"><span style="color:'+gc+'">&#9201; Repos 60s apr\u00e8s les 2 exos \u00b7 puis recommencer</span></div>'
    +'</div>';
}

function abdoHTML(){
  return '<div class="exrow"><div class="abanner">'
    +'<svg width="24" height="24" viewBox="0 0 28 28" fill="none">'
    +'<rect x="4" y="8" width="20" height="14" rx="3" fill="rgba(168,85,247,.2)" stroke="#a855f7" stroke-width="1.5"/>'
    +'<line x1="4" y1="13" x2="24" y2="13" stroke="#a855f7" stroke-width="1"/>'
    +'<line x1="14" y1="8" x2="14" y2="22" stroke="#a855f7" stroke-width="1"/>'
    +'<rect x="7" y="10" width="4" height="2.5" rx="1" fill="#a855f7"/>'
    +'<rect x="17" y="10" width="4" height="2.5" rx="1" fill="#a855f7"/>'
    +'</svg>'
    +'<span class="abtxt">AVANT LA S\u00c9ANCE \u00b7 Ab Machine \u00b7 4 \u00d7 15 reps</span>'
    +'</div></div>';
}

function exHTML(ex,day){
  var done=!!S.done[ex.id];
  var ec=exCol(ex,day.color);
  var reps=getReps(ex,WT);
  var w=S.weights[ex.id]||'';
  var hist=S.hist[ex.id]||[];
  var last=hist.length>0?hist[hist.length-1]:null;
  var showSugg=w&&w!=='\u2014'&&!ex.isAbdo&&ex.cat!=='cardio'&&last&&last.completedCount>=3&&last.weight===w;
  var newW=w?(parseFloat(w)+2.5).toFixed(1):'';
  var catB=ex.isAbdo?'<span class="bdg bab">Abdos</span>'
    :ex.cat==='assist'?'<span class="bdg ba">\uD83D\uDD35 Assist\u00e9e</span>'
    :ex.cat==='semi'?'<span class="bdg bs">\uD83D\uDFE1 Semi-guid\u00e9e</span>'
    :ex.cat==='free'?'<span class="bdg bf">\uD83D\uDD34 Libre</span>'
    :ex.cat==='cardio'?'<span class="bdg bc">\uD83C\uDFC3 Cardio</span>':'';
  var isoB=ex.isIso?'<span class="bdg bi">\uD83C\uDFAF Isolation</span>':'';
  var varB=ex.isVariant?'<span class="bdg" style="color:#e91e8c;border-color:rgba(233,30,140,.4);background:rgba(233,30,140,.1)">&#10022; SEM.B</span>':'';
  var doneB=done?'<span class="bdg bd">\u2713 Fait</span>':'';
  var opts=['\u2014','2.5','5','7.5','10','12.5','15','17.5','20','22.5','25','27.5','30','32.5','35','40','45','50','55','60','70','80','90','100','120'];
  var selOpts=opts.map(function(o){return '<option value="'+o+'"'+(o===(w||'\u2014')?' selected':'')+'>'+(o==='\u2014'?'S\u00e9lectionner kg':o+' kg')+'</option>';}).join('');
  var wRow=ex.cat!=='cardio'
    ?'<div class="wrow">'
      +'<span style="font-size:11px;color:#555">&#9878;</span>'
      +'<select class="wsel" data-id="'+ex.id+'" style="color:'+(w&&w!=='\u2014'?ec:'#555')+';border-color:'+(w&&w!=='\u2014'?ec+'60':'#2a2a30')+'">'+selOpts+'</select>'
      +(w&&w!=='\u2014'?'<span class="wval" style="color:'+ec+';background:'+ec+'18;border-color:'+ec+'40">'+w+' kg</span>':'')
      +'</div>'
      +(showSugg?'<div class="sugg">&#128200; Tu tiens '+w+'kg depuis 3 fois &mdash; essaie <strong>'+newW+' kg</strong></div>':'')
    :'';
  return '<div class="exrow">'
    +'<div class="extap" data-id="'+ex.id+'" style="background:'+(done?'rgba(46,204,113,.06)':'transparent')+'">'
    +'<div class="exicon" style="background:'+(done?'rgba(46,204,113,.1)':'#111113')+';border-color:'+(done?'rgba(46,204,113,.3)':'#252528')+'">'+mkIcon(ex.icon,done?'#2ecc71':ec,52)+'</div>'
    +'<div class="excnt">'
    +'<div class="exnm" style="color:'+(done?'#2ecc71':'#efefef')+'">'+ex.name+'</div>'
    +'<div class="exst"><strong style="color:'+(done?'#2ecc71':'#c0c0c0')+'">'+reps+'</strong></div>'
    +'<div class="extip">'+ex.tip+'</div>'
    +'<div class="exbadges">'+catB+isoB+varB+doneB+'</div>'
    +'</div>'
    +'<div class="exck" style="background:'+(done?'#2ecc71':'transparent')+';border-color:'+(done?'#2ecc71':'#333')+';color:'+(done?'#000':'transparent')+'">\u2713</div>'
    +'</div>'+wRow+'</div>';
}

function timerHTML(){
  var r=S.timer.remaining,t=S.timer.total,c=S.timer.color;
  var pct=Math.round((t-r)/t*100);
  var m=Math.floor(r/60),s=String(r%60).padStart(2,'0');
  return '<div class="tov" style="border-top:2px solid '+c+'">'
    +'<div class="trow">'
    +'<div style="flex:1">'
    +'<div class="tlbl">&#9203; REPOS EN COURS</div>'
    +'<div class="tcnt" id="tc" style="color:'+c+'">'+m+':'+s+'</div>'
    +'<div class="tbg"><div class="tfill" id="tf" style="width:'+pct+'%;background:'+c+'"></div></div>'
    +'</div>'
    +'<button class="tskip" id="tskip">Passer</button>'
    +'</div></div>';
}

// ── TIMER ──────────────────────────────────────────────────────────────────
function startTimer(){
  stopTimer();
  S.timer={remaining:60,total:60,color:'#2ecc71'};
  var t0=Date.now();
  S.timerIv=setInterval(function(){
    var left=60-Math.floor((Date.now()-t0)/1000);
    if(left<=0){stopTimer();beep();render();return;}
    S.timer.remaining=left;
    var tc=document.getElementById('tc');
    var tf=document.getElementById('tf');
    if(tc){tc.textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');}
    if(tf){tf.style.width=Math.round((60-left)/60*100)+'%';}
  },250);
  render();
}
function stopTimer(){
  if(S.timerIv){clearInterval(S.timerIv);S.timerIv=null;}
  S.timer=null;
}
function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0,.3],[1100,.35,.35],[1320,.75,.5]].forEach(function(x){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=x[0];
      g.gain.setValueAtTime(0,ctx.currentTime+x[1]);
      g.gain.linearRampToValueAtTime(.4,ctx.currentTime+x[1]+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+x[1]+x[2]);
      o.start(ctx.currentTime+x[1]);o.stop(ctx.currentTime+x[1]+x[2]);
    });
  }catch(e){}
}

setInterval(function(){
  var nwk=getWK();
  if(ld('mk10',null)!==nwk){S.done={};sv('mk10',nwk);render();}
},300000);

window.addEventListener('DOMContentLoaded',function(){render();});
</script>
